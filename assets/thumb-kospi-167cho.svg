<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="rope" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1D3557"/>
      <stop offset="50%" stop-color="#a3a3a0"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>
  </defs>
  <rect width="540" height="960" fill="url(#bg)"/>

  <!-- mono header -->
  <text x="270" y="120" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="18"
        fill="#6b6b68" letter-spacing="3">MIRJOURNAL · 0:45</text>

  <!-- big numbers -->
  <text x="270" y="380" text-anchor="middle"
        font-family="EB Garamond, serif" font-style="italic"
        font-size="120" font-weight="500" fill="#f5f5f0">
    167조
  </text>
  <text x="270" y="440" text-anchor="middle"
        font-family="EB Garamond, serif" font-style="italic"
        font-size="28" fill="#a3a3a0">사상 최대 공매도</text>

  <!-- rope -->
  <rect x="80" y="540" width="380" height="6" fill="url(#rope)" rx="3"/>
  <circle cx="80" cy="543" r="14" fill="#1D3557"/>
  <circle cx="460" cy="543" r="14" fill="#E63946"/>

  <text x="80" y="600" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="14"
        fill="#4ECDC4" letter-spacing="2">DOWN</text>
  <text x="460" y="600" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="14"
        fill="#E63946" letter-spacing="2">UP</text>

  <!-- title -->
  <text x="270" y="780" text-anchor="middle"
        font-family="Pretendard, sans-serif" font-size="32"
        font-weight="700" fill="#f5f5f0">코스피 167조</text>
  <text x="270" y="830" text-anchor="middle"
        font-family="Pretendard, sans-serif" font-size="32"
        font-weight="700" fill="#f5f5f0">줄다리기</text>

  <text x="270" y="900" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="14"
        fill="#6b6b68" letter-spacing="4">2026.05.12</text>
</svg>
